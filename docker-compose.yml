version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: smartfarm_mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: smartfarming
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./database/schema.sql:/docker-entrypoint-initdb.d/schema.sql:z
    restart: unless-stopped

  mosquitto:
    image: eclipse-mosquitto:2
    container_name: smartfarm_mosquitto
    ports:
      - "1883:1883"
      - "9001:9001"
    volumes:
      - ./mosquitto.conf:/mosquitto/config/mosquitto.conf:z
    restart: unless-stopped

volumes:
  mysql_data:
